name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Ruff check
        run: cd backend && ruff check .

      - name: Ruff format check
        run: cd backend && ruff format --check .

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend unit tests
        run: cd frontend && npm test

      - name: TypeScript type check
        run: cd frontend && npx tsc -b

      - name: ESLint
        run: cd frontend && npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run unit tests
        run: cd backend && python -m pytest tests/unit/ -v
        env:
          DESCOPE_PROJECT_ID: "test-project-id"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run integration tests
        if: env.DESCOPE_PROJECT_ID != ''
        run: cd backend && python -m pytest tests/integration/ -v
        env:
          DESCOPE_PROJECT_ID: ${{ secrets.DESCOPE_PROJECT_ID }}
          DESCOPE_CLIENT_ID: ${{ secrets.DESCOPE_CLIENT_ID }}
          DESCOPE_CLIENT_SECRET: ${{ secrets.DESCOPE_CLIENT_SECRET }}
          DESCOPE_EXPIRED_TOKEN: ${{ secrets.DESCOPE_EXPIRED_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
          pip install pytest-playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_DESCOPE_PROJECT_ID: ${{ secrets.DESCOPE_PROJECT_ID }}

      - name: Start backend
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
        env:
          DESCOPE_PROJECT_ID: ${{ secrets.DESCOPE_PROJECT_ID }}
          DESCOPE_MANAGEMENT_KEY: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Start frontend (preview)
        run: |
          cd frontend
          npx vite preview --port 3000 &
          sleep 2

      - name: Run E2E tests
        if: env.DESCOPE_PROJECT_ID != ''
        run: cd backend && python -m pytest tests/e2e/ -v
        env:
          DESCOPE_PROJECT_ID: ${{ secrets.DESCOPE_PROJECT_ID }}
          DESCOPE_MANAGEMENT_KEY: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}
          DESCOPE_CLIENT_ID: ${{ secrets.DESCOPE_CLIENT_ID }}
          DESCOPE_CLIENT_SECRET: ${{ secrets.DESCOPE_CLIENT_SECRET }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_TENANT_ID: ${{ secrets.E2E_TEST_TENANT_ID }}
          E2E_FRONTEND_URL: "http://localhost:3000"
          E2E_BACKEND_URL: "http://localhost:8000"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker images
        run: docker compose build
        env:
          DESCOPE_PROJECT_ID: "test-project-id"
          POSTGRES_PASSWORD: "ci-build-only"
          TYK_GATEWAY_SECRET: "ci-build-only"

  profile-integration-tests:
    name: Profile Integration Tests
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-integration
      DESCOPE_PROJECT_ID: ci-test-project
      TYK_GATEWAY_SECRET: ci-integration-secret
    steps:
      - uses: actions/checkout@v6

      - name: Create .env for compose env_file
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DESCOPE_PROJECT_ID=${DESCOPE_PROJECT_ID}
          TYK_GATEWAY_SECRET=${TYK_GATEWAY_SECRET}
          DESCOPE_MANAGEMENT_KEY=ci-integration
          EOF

      - name: Run standalone profile integration tests
        run: make test-integration-standalone

      - name: Dump standalone compose logs on failure
        if: failure()
        run: docker compose logs --tail=200 || true

      - name: Run gateway profile integration tests
        run: make test-integration-gateway

      - name: Dump gateway compose logs on failure
        if: failure()
        run: docker compose --profile gateway logs --tail=200 || true
