# Deployment profiles:
#
#   default (no flag):  frontend + backend + postgres (3 containers)
#                       Minimum functional dev stack — backend lifespan
#                       requires postgres for the SELECT 1 connectivity
#                       check, so postgres stays in the default set.
#                       docker compose up --build
#
#   gateway:            default + tyk-init + tyk-gateway + tyk-redis (6 containers)
#                       docker compose --profile gateway up --build
#
#   full:               same as gateway (placeholder for future services)
#                       docker compose --profile full up --build
#
#   infra:              redis + aspire-dashboard (observability/cache, opt-in)
#                       docker compose --profile infra up --build
#                       docker compose --profile gateway --profile infra up --build

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_DESCOPE_PROJECT_ID: ${DESCOPE_PROJECT_ID}
        # VITE_API_BASE_URL controls where the browser sends API requests.
        # Default is empty so the frontend uses RELATIVE URLs (`/api/...`)
        # and nginx's `/api/` proxy forwards them to backend:8000 — same
        # origin as the page. The gateway override (story 4.2) flips this
        # to http://localhost:8080 so the browser hits Tyk directly.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "3000:8080"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    # env_file loads .env first (required: false → skipped when absent, e.g. in
    # CI), then environment: block overrides / supplies defaults via host env.
    env_file:
      - path: .env
        required: false
    environment:
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql+asyncpg://identity:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/identity
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=identity-stack-backend
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - DESCOPE_PROJECT_ID=${DESCOPE_PROJECT_ID:-}
      - DESCOPE_MANAGEMENT_KEY=${DESCOPE_MANAGEMENT_KEY:-}
      # DEPLOYMENT_MODE selects whether the backend runs its own JWT
      # validation + rate limiting (standalone) or trusts Tyk to have
      # done it (gateway). Default is standalone; gateway mode is
      # opt-in via the docker-compose.gateway.yml override (story 3.2)
      # which `make dev-gateway` and `make test-integration-gateway`
      # both wrap automatically.
      - DEPLOYMENT_MODE=standalone
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=identity
      - POSTGRES_USER=identity
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity"]
      interval: 5s
      timeout: 3s
      retries: 5

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    ports:
      - "127.0.0.1:18888:18888"
      - "127.0.0.1:4317:18889"
    environment:
      # WARNING: Unsecured auth mode means any service on the Docker network can
      # inject or read traces. Acceptable for local dev; for shared environments,
      # switch to ApiKey mode. See: https://learn.microsoft.com/dotnet/aspire/fundamentals/dashboard/configuration
      - DASHBOARD__OTLP__AUTHMODE=Unsecured
    profiles:
      - infra

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    profiles:
      - infra

  # Init sidecar: substitutes ${DESCOPE_PROJECT_ID} in Tyk API definition
  # templates and writes the processed files into the tyk-apps named volume.
  # Required because tykio/tyk-gateway:v5.3 is a scratch image with no shell,
  # so substitution cannot run inside the gateway container. tyk-gateway
  # waits on this via depends_on: service_completed_successfully.
  tyk-init:
    image: alpine:3.20
    environment:
      - DESCOPE_PROJECT_ID=${DESCOPE_PROJECT_ID:?Set DESCOPE_PROJECT_ID in .env}
    volumes:
      - ./tyk/apps:/in:ro
      - tyk-apps:/out
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        # Validate DESCOPE_PROJECT_ID contains only safe characters
        case "$$DESCOPE_PROJECT_ID" in
          *[!A-Za-z0-9_-]*)
            echo "FATAL: DESCOPE_PROJECT_ID contains invalid characters (expected alphanumeric, hyphens, underscores)" >&2
            exit 1
            ;;
        esac
        # Re-substitute from scratch on every run so stale entries from a
        # previous project id don't leak into the gateway.
        rm -f /out/*.json 2>/dev/null || true
        count=0
        for f in /in/*.json; do
          [ -f "$$f" ] || continue
          outfile="/out/$$(basename "$$f")"
          sed "s|\$${DESCOPE_PROJECT_ID}|$$DESCOPE_PROJECT_ID|g" "$$f" > "$$outfile"
          count=$$((count + 1))
        done
        echo "tyk-init: substituted $$count API definition(s) into tyk-apps volume"
    profiles:
      - gateway
      - full

  tyk-gateway:
    image: tykio/tyk-gateway:v5.3
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./tyk/tyk.conf:/opt/tyk-gateway/tyk.conf
      - tyk-apps:/opt/tyk-gateway/apps:ro
      - ./tyk/middleware:/opt/tyk-gateway/middleware
      - ./tyk/policies:/opt/tyk-gateway/policies
    environment:
      - TYK_GW_SECRET=${TYK_GATEWAY_SECRET:?Set TYK_GATEWAY_SECRET in .env}
      - TYK_GW_STORAGE_HOST=tyk-redis
      - TYK_GW_STORAGE_PORT=6379
      - TYK_GW_STORAGE_PASSWORD=${TYK_REDIS_PASSWORD:-changeme}
    depends_on:
      tyk-init:
        condition: service_completed_successfully
      tyk-redis:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    profiles:
      - gateway
      - full

  tyk-redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${TYK_REDIS_PASSWORD:-changeme}
    volumes:
      - tyk-redis-data:/data
    restart: unless-stopped
    profiles:
      - gateway
      - full

volumes:
  pgdata:
  tyk-redis-data:
  tyk-apps:
