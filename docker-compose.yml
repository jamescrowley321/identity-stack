services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_DESCOPE_PROJECT_ID=${DESCOPE_PROJECT_ID}

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DESCOPE_PROJECT_ID=${DESCOPE_PROJECT_ID}
      - FRONTEND_URL=http://localhost:3000
