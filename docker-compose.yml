services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_DESCOPE_PROJECT_ID: ${DESCOPE_PROJECT_ID}
    ports:
      - "3000:8080"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    # env_file loads .env first (required: false → skipped when absent, e.g. in
    # CI), then environment: block overrides / supplies defaults via host env.
    env_file:
      - path: .env
        required: false
    environment:
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql+asyncpg://identity:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/identity
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=identity-stack-backend
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - DESCOPE_PROJECT_ID=${DESCOPE_PROJECT_ID:-}
      - DESCOPE_MANAGEMENT_KEY=${DESCOPE_MANAGEMENT_KEY:-}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).read()"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=identity
      - POSTGRES_USER=identity
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity"]
      interval: 5s
      timeout: 3s
      retries: 5

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    ports:
      - "127.0.0.1:18888:18888"
      - "127.0.0.1:4317:18889"
    environment:
      # WARNING: Unsecured auth mode means any service on the Docker network can
      # inject or read traces. Acceptable for local dev; for shared environments,
      # switch to ApiKey mode. See: https://learn.microsoft.com/dotnet/aspire/fundamentals/dashboard/configuration
      - DASHBOARD__OTLP__AUTHMODE=Unsecured

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}

  tyk-gateway:
    image: tykio/tyk-gateway:v5.3
    entrypoint: ["/opt/tyk-gateway/entrypoint.sh"]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./tyk/entrypoint.sh:/opt/tyk-gateway/entrypoint.sh:ro
      - ./tyk/tyk.conf:/opt/tyk-gateway/tyk.conf
      - ./tyk/apps:/opt/tyk-gateway/apps-templates:ro
      - ./tyk/middleware:/opt/tyk-gateway/middleware
      - ./tyk/policies:/opt/tyk-gateway/policies
    environment:
      - TYK_GW_SECRET=${TYK_GATEWAY_SECRET:?Set TYK_GATEWAY_SECRET in .env}
      - TYK_GW_STORAGE_HOST=tyk-redis
      - TYK_GW_STORAGE_PORT=6379
      - TYK_GW_STORAGE_PASSWORD=${TYK_REDIS_PASSWORD:-changeme}
      - DESCOPE_PROJECT_ID=${DESCOPE_PROJECT_ID:?Set DESCOPE_PROJECT_ID in .env}
    depends_on:
      - tyk-redis
      - backend
    restart: unless-stopped
    profiles:
      - gateway
      - full

  tyk-redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${TYK_REDIS_PASSWORD:-changeme}
    volumes:
      - tyk-redis-data:/data
    restart: unless-stopped
    profiles:
      - gateway
      - full

volumes:
  pgdata:
  tyk-redis-data:
