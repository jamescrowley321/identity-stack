services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_DESCOPE_PROJECT_ID: ${DESCOPE_PROJECT_ID}
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FRONTEND_URL=http://localhost:3000
